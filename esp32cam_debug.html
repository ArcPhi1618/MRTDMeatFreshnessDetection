<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESP32-CAM Debug Display</title>
    <style>
        #esp32-cam-debug {
            width: 480px;
            height: 360px;
            background: #222;
            border: 2px solid #444;
            display: block;
            margin-bottom: 10px;
        }
        .debug-controls button {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h2>ESP32-CAM Debug Display</h2>
    <img id="esp32-cam-debug" alt="ESP32 Camera Stream" />
    <div class="debug-controls">
        <button id="esp32cam-pause">Pause</button>
        <button id="esp32cam-resume">Resume</button>
    </div>
    <script src="js-esp32cam-display.js"></script>
</body>
</html>
