

        <!DOCTYPE html>
        <html>
        <head>
            <title>ESP32-CAM Live Stream</title>
            <style>
                body { font-family: monospace; background: #1a1a1a; color: #0f0; padding: 20px; }
                button { padding: 8px 15px; margin: 5px; background: #0f0; color: #000; border: none; cursor: pointer; font-weight: bold; }
                button:hover { background: #0a0; }
                .output { background: #000; padding: 10px; margin: 10px 0; border: 1px solid #0f0; max-height: 300px; overflow-y: auto; }
                .error { color: #f00; }
                .success { color: #0f0; }
                .info { color: #0af; }
                h2 { color: #0f0; border-bottom: 2px solid #0f0; }
            </style>
        </head>
        <body>
            <h1>ESP32-CAM Live Stream</h1>
            <div>
                <label for="esp32StreamUrl">ESP32-CAM Stream URL:</label>
                <input type="text" id="esp32StreamUrl" value="http://192.168.4.2:81/stream" style="width:350px;">
                <button onclick="startEsp32Stream()">Start Stream</button>
                <button onclick="stopEsp32Stream()" id="stopEsp32StreamBtn" style="display:none;">Stop Stream</button>
                <div style="margin-top:10px;">
                    <img id="esp32StreamImg" src="" alt="ESP32-CAM Stream" style="max-width:100%; border:2px solid #0f0; display:none; background:#000;">
                </div>
                <div id="esp32StreamStatus" class="output"></div>
            </div>
            <script>
                function log(elementId, message, type = 'info') {
                    const el = document.getElementById(elementId);
                    const line = document.createElement('div');
                    if(type === 'error') line.className = 'error';
                    else if(type === 'success') line.className = 'success';
                    else line.className = 'info';
                    line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + message;
                    el.appendChild(line);
                    el.scrollTop = el.scrollHeight;
                }
                function startEsp32Stream() {
                    const url = document.getElementById('esp32StreamUrl').value;
                    const img = document.getElementById('esp32StreamImg');
                    const status = document.getElementById('esp32StreamStatus');
                    status.innerHTML = '';
                    img.style.display = 'block';
                    document.getElementById('stopEsp32StreamBtn').style.display = 'inline';
                    log('esp32StreamStatus', 'Starting ESP32-CAM stream...', 'info');
                    img.src = url;
                    log('esp32StreamStatus', 'Stream URL: ' + url, 'info');
                }
                function stopEsp32Stream() {
                    const img = document.getElementById('esp32StreamImg');
                    img.src = '';
                    img.style.display = 'none';
                    document.getElementById('stopEsp32StreamBtn').style.display = 'none';
                    log('esp32StreamStatus', 'ESP32-CAM stream stopped.', 'info');
                }
            </script>
        </body>
        </html>
